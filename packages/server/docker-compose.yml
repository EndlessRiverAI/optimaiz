version: '3.8'

services:
  optimaiz:
    build: .
    image: optimaiz/server:latest
    container_name: optimaiz-server
    ports:
      - "3456:3456"
    volumes:
      - optimaiz-data:/data
    environment:
      - NODE_ENV=production
      - PORT=3456
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3456/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  optimaiz-data:
